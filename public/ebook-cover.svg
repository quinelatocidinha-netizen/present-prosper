<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a3a"/>
      <stop offset="100%" style="stop-color:#1e3044"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4a8"/>
      <stop offset="100%" style="stop-color:#3cb5a0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" rx="8" fill="url(#bg)"/>
  <rect x="40" y="40" width="520" height="720" rx="4" fill="none" stroke="#2dd4a8" stroke-width="0.5" opacity="0.3"/>
  <text x="300" y="280" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="42" font-weight="bold">
    <tspan x="300" dy="0">Seu Negócio</tspan>
    <tspan x="300" dy="52">Mais Profissional</tspan>
  </text>
  <rect x="200" y="360" width="200" height="2" fill="url(#accent)" opacity="0.6"/>
  <text x="300" y="410" text-anchor="middle" fill="#a0b4c8" font-family="Arial,sans-serif" font-size="18">
    <tspan x="300" dy="0">no Instagram e no Google</tspan>
  </text>
  <rect x="220" y="460" width="40" height="40" rx="8" fill="none" stroke="#2dd4a8" stroke-width="1.5" opacity="0.5"/>
  <rect x="280" y="460" width="40" height="40" rx="8" fill="none" stroke="#2dd4a8" stroke-width="1.5" opacity="0.5"/>
  <rect x="340" y="460" width="40" height="40" rx="8" fill="none" stroke="#2dd4a8" stroke-width="1.5" opacity="0.5"/>
  <text x="300" y="700" text-anchor="middle" fill="#6b8299" font-family="Arial,sans-serif" font-size="13" letter-spacing="3">GUIA PRÁTICO</text>
</svg>